<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetPulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', sans-serif;
      width: 320px;
      background: #fff;
      color: #202124;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      padding: 20px;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .header-text h1 { font-size: 18px; font-weight: 700; }
    .header-text p { font-size: 12px; opacity: 0.75; margin-top: 2px; }

    .content { padding: 16px; }

    .status-card {
      background: #f8f9fa;
      border: 1px solid #e8eaed;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-indicator {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #9aa0a6;
      flex-shrink: 0;
    }
    .status-indicator.active { background: #34a853; animation: pulse 1.5s infinite; }
    .status-indicator.recording { background: #ea4335; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 currentColor; }
      50% { box-shadow: 0 0 0 5px transparent; }
    }

    .status-text { flex: 1; }
    .status-label { font-size: 13px; font-weight: 600; color: #202124; }
    .status-sub { font-size: 11px; color: #5f6368; margin-top: 2px; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Google Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 8px;
    }

    .btn-primary { background: #1a73e8; color: white; }
    .btn-primary:hover { background: #0d47a1; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,115,232,0.4); }

    .btn-danger { background: #fce8e6; color: #d93025; }
    .btn-danger:hover { background: #f5c6c2; }

    .btn-outline { background: #f8f9fa; color: #5f6368; border: 1px solid #e8eaed; }
    .btn-outline:hover { background: #f1f3f4; }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .divider { height: 1px; background: #e8eaed; margin: 14px 0; }

    .link-row {
      display: flex;
      gap: 8px;
    }

    .link-btn {
      flex: 1;
      background: #f8f9fa;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      font-family: 'Google Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #1a73e8;
      text-decoration: none;
      transition: background 0.2s;
    }
    .link-btn:hover { background: #e8f0fe; }

    .version { text-align: center; font-size: 10px; color: #9aa0a6; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🎙️</div>
    <div class="header-text">
      <h1>MeetPulse</h1>
      <p>AI Meeting Intelligence</p>
    </div>
  </div>

  <div class="content">
    <div class="status-card">
      <div class="status-indicator" id="status-indicator"></div>
      <div class="status-text">
        <div class="status-label" id="status-label">No active meeting</div>
        <div class="status-sub" id="status-sub">Open Google Meet, Zoom, or Teams to begin</div>
      </div>
    </div>

    <button class="btn btn-primary" id="btn-start" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Start AI Capture
    </button>

    <button class="btn btn-danger hidden" id="btn-stop">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
      Stop Capture
    </button>

    <button class="btn btn-outline" id="btn-debrief">
      📄 Generate Debrief
    </button>

    <div class="divider"></div>

    <div class="link-row">
      <a href="#" id="link-docs" target="_blank" class="link-btn">🔧 Backend API</a>
      <a href="#" id="link-meetings" target="_blank" class="link-btn">📋 All Meetings</a>
    </div>

    <div class="version">MeetPulse v1.0.0 — Powered by Deepgram + Groq</div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
